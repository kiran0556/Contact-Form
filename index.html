<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form | Task 6</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="scrpits.js" defer></script>
</head>
<body>
  <div class="center-wrapper">
    <div class="form-card">
      <div class="form-header">
        <div class="icon-circle">✉️</div>
        <h1>Contact Us</h1>
        <p>We’d love to hear from you. Fill in the details below.</p>
      </div>

      <!-- Success message -->
      <div id="successMessage" class="success-message" aria-live="polite"></div>

      <form id="contactForm" novalidate>
        <!-- Name -->
        <div class="form-group">
          <label for="name">Name <span class="required">*</span></label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            aria-describedby="nameError"
          />
          <small id="nameError" class="error-message"></small>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            aria-describedby="emailError"
          />
          <small id="emailError" class="error-message"></small>
        </div>

        <!-- Message -->
        <div class="form-group">
          <label for="message">Message <span class="required">*</span></label>
          <textarea
            id="message"
            name="message"
            rows="4"
            placeholder="Type your message here..."
            aria-describedby="messageError"
          ></textarea>
          <small id="messageError" class="error-message"></small>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Send Message</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
